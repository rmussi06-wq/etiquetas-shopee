<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etiquetas Shopee · ZPL → PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/libarchive.js/1.3.0/libarchive.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,.12);
      --text: #e8e8f0;
      --muted: #6b6b80;
      --error: #ff5f6d;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown .5s ease both;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--accent);
    }

    header p {
      color: var(--muted);
      font-size: .85rem;
      margin-top: .4rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      max-width: 680px;
      margin: 0 auto 1.2rem;
      animation: fadeUp .45s ease both;
    }

    .card + .card { animation-delay: .07s; }
    .card:nth-child(3) { animation-delay: .14s; }

    label.section-label {
      font-family: 'Syne', sans-serif;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
      margin-bottom: .8rem;
    }

    /* Drop zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }

    .dropzone:hover, .dropzone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .dropzone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .dropzone-icon {
      font-size: 2rem;
      margin-bottom: .6rem;
      display: block;
    }

    .dropzone p { color: var(--muted); font-size: .82rem; }
    .dropzone strong { color: var(--text); }

    /* Settings */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: .8rem;
    }

    @media (max-width: 480px) {
      .settings-grid { grid-template-columns: 1fr 1fr; }
    }

    .field label {
      font-size: .72rem;
      color: var(--muted);
      display: block;
      margin-bottom: .35rem;
    }

    .field select, .field input[type=number] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: .85rem;
      padding: .45rem .6rem;
      appearance: none;
      transition: border-color .2s;
    }

    .field select:focus, .field input[type=number]:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* File list */
    #file-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }

    .file-item {
      display: flex;
      align-items: center;
      gap: .8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .6rem .9rem;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .file-item:hover { border-color: var(--accent); background: var(--accent-dim); }
    .file-item.active { border-color: var(--accent); background: var(--accent-dim); }

    .file-item span { flex: 1; font-size: .82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .file-badge {
      font-size: .65rem;
      padding: .15rem .45rem;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      flex-shrink: 0;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: .7rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .btn {
      font-family: 'Syne', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: .6rem 1.2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: .02em;
    }

    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #0a0a0f; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* Progress */
    #progress-wrap {
      display: none;
      align-items: center;
      gap: .8rem;
      margin-top: 1rem;
    }

    #progress-wrap.visible { display: flex; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    #progress-text { font-size: .8rem; color: var(--muted); }

    /* Error */
    #error-box {
      display: none;
      margin-top: .9rem;
      background: rgba(255,95,109,.08);
      border: 1px solid rgba(255,95,109,.3);
      border-radius: 8px;
      padding: .7rem 1rem;
      font-size: .8rem;
      color: var(--error);
    }

    #error-box.visible { display: block; }

    /* PDF preview */
    #preview-card { display: none; }
    #preview-card.visible { display: block; }

    #pdf-canvas {
      width: 100%;
      border-radius: 6px;
      display: block;
    }

    #page-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .8rem;
      margin-top: .8rem;
      font-size: .8rem;
      color: var(--muted);
    }

    #page-controls button {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: .3rem .7rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
      transition: border-color .2s;
    }

    #page-controls button:hover { border-color: var(--accent); }
    #page-controls button:disabled { opacity: .35; cursor: not-allowed; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      color: var(--muted);
      font-size: .82rem;
      text-align: center;
      padding: 1rem 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Etiquetas Shopee</h1>
  <p>Converta arquivos ZPL para PDF direto no navegador</p>
</header>

<!-- Upload -->
<div class="card">
  <label class="section-label">1 · Selecionar arquivo</label>
  <div class="dropzone" id="dropzone">
    <input type="file" id="rar-input" accept=".rar,.zip" />
    <span class="dropzone-icon">📦</span>
    <p><strong>Arraste um .rar</strong> ou clique para selecionar</p>
    <p style="margin-top:.3rem">Suporte a arquivos .rar contendo etiquetas .zpl</p>
  </div>
</div>

<!-- ZPL file list -->
<div class="card" id="files-card" style="display:none">
  <label class="section-label">2 · Etiquetas encontradas</label>
  <ul id="file-list"></ul>
</div>

<!-- Settings + actions -->
<div class="card" id="actions-card" style="display:none">
  <label class="section-label">3 · Configurações</label>
  <div class="settings-grid">
    <div class="field">
      <label>Densidade</label>
      <select id="sel-dpmm">
        <option value="6dpmm">6 dpmm</option>
        <option value="8dpmm" selected>8 dpmm</option>
        <option value="12dpmm">12 dpmm</option>
        <option value="24dpmm">24 dpmm</option>
      </select>
    </div>
    <div class="field">
      <label>Largura (pol.)</label>
      <input type="number" id="inp-width" value="4" min="1" max="15" step="0.5" />
    </div>
    <div class="field">
      <label>Altura (pol.)</label>
      <input type="number" id="inp-height" value="6" min="1" max="15" step="0.5" />
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btn-preview" disabled>Pré-visualizar</button>
    <button class="btn btn-secondary" id="btn-download" disabled>Converter e Baixar</button>
  </div>

  <div id="progress-wrap">
    <div class="spinner"></div>
    <span id="progress-text">Convertendo…</span>
  </div>

  <div id="error-box"></div>
</div>

<!-- PDF preview -->
<div class="card" id="preview-card">
  <label class="section-label">Pré-visualização</label>
  <canvas id="pdf-canvas"></canvas>
  <div id="page-controls">
    <button id="btn-prev" disabled>&#8592;</button>
    <span id="page-info">Página 1 de 1</span>
    <button id="btn-next" disabled>&#8594;</button>
  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  const WORKER_URL = 'https://zpl-proxy.YOUR_USERNAME.workers.dev';

  // ─── STATE ────────────────────────────────────────────────────────────────
  let zplFiles = [];          // { name, content }[]
  let selectedIndex = -1;
  let pdfDoc = null;
  let currentPage = 1;

  // ─── DOM REFS ─────────────────────────────────────────────────────────────
  const rarInput     = document.getElementById('rar-input');
  const dropzone     = document.getElementById('dropzone');
  const filesCard    = document.getElementById('files-card');
  const actionsCard  = document.getElementById('actions-card');
  const fileList     = document.getElementById('file-list');
  const btnPreview   = document.getElementById('btn-preview');
  const btnDownload  = document.getElementById('btn-download');
  const progressWrap = document.getElementById('progress-wrap');
  const progressText = document.getElementById('progress-text');
  const errorBox     = document.getElementById('error-box');
  const previewCard  = document.getElementById('preview-card');
  const pdfCanvas    = document.getElementById('pdf-canvas');
  const pageInfo     = document.getElementById('page-info');
  const btnPrev      = document.getElementById('btn-prev');
  const btnNext      = document.getElementById('btn-next');

  // ─── DRAG & DROP ──────────────────────────────────────────────────────────
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  rarInput.addEventListener('change', () => {
    if (rarInput.files[0]) handleFile(rarInput.files[0]);
  });

  // ─── FILE EXTRACTION ──────────────────────────────────────────────────────
  async function handleFile(file) {
    clearError();
    zplFiles = [];
    selectedIndex = -1;
    fileList.innerHTML = '';
    filesCard.style.display = 'none';
    actionsCard.style.display = 'none';
    previewCard.classList.remove('visible');

    showProgress('Extraindo arquivos…');

    try {
      const archive = await Archive.open(file);
      const entries = await archive.extractFiles();

      for (const [name, blob] of Object.entries(entries)) {
        if (name.toLowerCase().endsWith('.zpl')) {
          const content = await blob.text();
          zplFiles.push({ name, content });
        }
      }

      hideProgress();

      if (zplFiles.length === 0) {
        showError('Nenhum arquivo .zpl encontrado dentro do arquivo enviado.');
        return;
      }

      renderFileList();
      filesCard.style.display = 'block';
      actionsCard.style.display = 'block';

    } catch (err) {
      hideProgress();
      showError(`Erro ao extrair arquivo: ${err.message}`);
    }
  }

  function renderFileList() {
    fileList.innerHTML = '';
    if (zplFiles.length === 0) {
      fileList.innerHTML = '<li class="empty-state">Nenhuma etiqueta encontrada.</li>';
      return;
    }

    zplFiles.forEach((f, i) => {
      const li = document.createElement('li');
      li.className = 'file-item' + (i === selectedIndex ? ' active' : '');
      li.innerHTML = `<span title="${f.name}">${f.name}</span><span class="file-badge">ZPL</span>`;
      li.addEventListener('click', () => selectFile(i));
      fileList.appendChild(li);
    });
  }

  function selectFile(index) {
    selectedIndex = index;
    renderFileList();
    btnPreview.disabled = false;
    btnDownload.disabled = false;
    clearError();
    previewCard.classList.remove('visible');
  }

  // ─── CONVERSION ───────────────────────────────────────────────────────────
  async function convertZpl(zplContent) {
    const dpmm   = document.getElementById('sel-dpmm').value;
    const width  = parseFloat(document.getElementById('inp-width').value) || 4;
    const height = parseFloat(document.getElementById('inp-height').value) || 6;

    const response = await fetch(`${WORKER_URL}/convert`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ zpl: zplContent, dpmm, width, height }),
    });

    if (!response.ok) {
      const msg = await response.text();
      throw new Error(msg || `HTTP ${response.status}`);
    }

    return response.blob();
  }

  btnPreview.addEventListener('click', async () => {
    if (selectedIndex < 0) return;
    clearError();
    showProgress('Convertendo…');
    btnPreview.disabled = true;
    btnDownload.disabled = true;

    try {
      const blob = await convertZpl(zplFiles[selectedIndex].content);
      const url  = URL.createObjectURL(blob);
      await renderPdf(url);
      previewCard.classList.add('visible');
    } catch (err) {
      showError(`Erro na conversão: ${err.message}`);
    } finally {
      hideProgress();
      btnPreview.disabled = false;
      btnDownload.disabled = false;
    }
  });

  btnDownload.addEventListener('click', async () => {
    if (selectedIndex < 0) return;
    clearError();
    showProgress('Gerando PDF…');
    btnPreview.disabled = true;
    btnDownload.disabled = true;

    try {
      const blob = await convertZpl(zplFiles[selectedIndex].content);
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = zplFiles[selectedIndex].name.replace(/\.zpl$/i, '.pdf');
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      showError(`Erro ao gerar PDF: ${err.message}`);
    } finally {
      hideProgress();
      btnPreview.disabled = false;
      btnDownload.disabled = false;
    }
  });

  // ─── PDF RENDERING ────────────────────────────────────────────────────────
  async function renderPdf(url) {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    currentPage = 1;
    await renderPage(currentPage);
    updatePageControls();
  }

  async function renderPage(num) {
    const page    = await pdfDoc.getPage(num);
    const scale   = pdfCanvas.offsetWidth / page.getViewport({ scale: 1 }).width || 1.5;
    const viewport = page.getViewport({ scale });
    const ctx     = pdfCanvas.getContext('2d');

    pdfCanvas.width  = viewport.width;
    pdfCanvas.height = viewport.height;

    await page.render({ canvasContext: ctx, viewport }).promise;
  }

  function updatePageControls() {
    const total = pdfDoc ? pdfDoc.numPages : 1;
    pageInfo.textContent = `Página ${currentPage} de ${total}`;
    btnPrev.disabled = currentPage <= 1;
    btnNext.disabled = currentPage >= total;
  }

  btnPrev.addEventListener('click', async () => {
    if (currentPage > 1) { currentPage--; await renderPage(currentPage); updatePageControls(); }
  });

  btnNext.addEventListener('click', async () => {
    if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; await renderPage(currentPage); updatePageControls(); }
  });

  // ─── UI HELPERS ───────────────────────────────────────────────────────────
  function showProgress(msg) {
    progressText.textContent = msg;
    progressWrap.classList.add('visible');
  }

  function hideProgress() {
    progressWrap.classList.remove('visible');
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('visible');
  }

  function clearError() {
    errorBox.textContent = '';
    errorBox.classList.remove('visible');
  }
</script>
</body>
</html>
