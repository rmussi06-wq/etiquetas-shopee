<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etiquetas Shopee — ZPL → PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/libarchive.js/1.3.0/libarchive.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #00e5a0;
      --accent-dim: #00e5a022;
      --text: #e0e0f0;
      --muted: #6b6b8a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    main {
      flex: 1;
      padding: 1.5rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }

    .settings label {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .settings select,
    .settings input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 0.5rem 0.6rem;
      width: 100%;
    }

    .settings select:focus,
    .settings input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone input[type="file"] { display: none; }

    .drop-zone .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .drop-zone h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .drop-zone p {
      font-size: 0.8rem;
      color: var(--muted);
    }

    #status {
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    #status.error { color: #ff6b6b; }
    #status.ok { color: var(--accent); }

    #results {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .label-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .label-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .label-card-header span { color: var(--muted); }

    .label-card-header a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      border: 1px solid var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .label-card-header a:hover { background: var(--accent-dim); }

    .label-card canvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: 500px;
      object-fit: contain;
      background: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Etiquetas Shopee</h1>
    <p>Converta arquivos ZPL de envio em PDF para impressão</p>
  </header>

  <main>
    <div class="settings">
      <label>
        Densidade
        <select id="dpmm">
          <option value="6dpmm">6 dpmm</option>
          <option value="8dpmm" selected>8 dpmm</option>
          <option value="12dpmm">12 dpmm</option>
          <option value="24dpmm">24 dpmm</option>
        </select>
      </label>
      <label>
        Largura (pol)
        <input type="number" id="width" value="4" min="1" max="15" step="0.5" />
      </label>
      <label>
        Altura (pol)
        <input type="number" id="height" value="6" min="1" max="15" step="0.5" />
      </label>
    </div>

    <label class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".rar" />
      <div class="icon">📦</div>
      <h2>Arraste o arquivo .rar aqui</h2>
      <p>ou clique para selecionar — o arquivo deve conter etiquetas .zpl da Shopee</p>
    </label>

    <div id="status"></div>
    <div id="results"></div>
  </main>

  <script>
    // Atualize esta URL após fazer o deploy do Worker
    const WORKER_URL = 'https://zpl-proxy.rmussi06.workers.dev';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) processRar(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) processRar(fileInput.files[0]);
    });

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    async function processRar(file) {
      resultsEl.innerHTML = '';
      setStatus('Extraindo arquivos ZPL...');

      const archive = await libarchive.Archive.open(file);
      const entries = await archive.getFilesArray();
      const zplEntries = entries.filter((e) => e.name.toLowerCase().endsWith('.zpl'));

      if (zplEntries.length === 0) {
        setStatus('Nenhum arquivo .zpl encontrado no .rar.', 'error');
        return;
      }

      setStatus(`Encontrado(s) ${zplEntries.length} arquivo(s) ZPL. Convertendo...`);

      const dpmm = document.getElementById('dpmm').value;
      const width = document.getElementById('width').value;
      const height = document.getElementById('height').value;

      let done = 0;
      for (const entry of zplEntries) {
        try {
          const blob = await entry.extract();
          const zpl = await blob.text();

          const res = await fetch(`${WORKER_URL}/convert`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ zpl, dpmm, width: parseFloat(width), height: parseFloat(height) }),
          });

          if (!res.ok) {
            const err = await res.text();
            throw new Error(err);
          }

          const pdfBlob = await res.blob();
          await renderCard(entry.name, pdfBlob);

          done++;
          setStatus(`Convertidos ${done}/${zplEntries.length}...`);

          // respeita o limite de 3 req/s da Labelary
          if (done < zplEntries.length) await sleep(350);
        } catch (err) {
          const card = document.createElement('div');
          card.className = 'label-card';
          card.innerHTML = `<div class="label-card-header"><span>${entry.name}</span><span style="color:#ff6b6b">Erro: ${err.message}</span></div>`;
          resultsEl.appendChild(card);
        }
      }

      setStatus(`Concluído — ${done} de ${zplEntries.length} etiqueta(s) convertida(s).`, 'ok');
    }

    async function renderCard(name, pdfBlob) {
      const url = URL.createObjectURL(pdfBlob);
      const pdf = await pdfjsLib.getDocument(url).promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

      const card = document.createElement('div');
      card.className = 'label-card';
      card.innerHTML = `
        <div class="label-card-header">
          <span>${name}</span>
          <a href="${url}" download="${name.replace(/\.zpl$/i, '.pdf')}">Baixar PDF</a>
        </div>`;
      card.appendChild(canvas);
      resultsEl.appendChild(card);
    }

    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }
  </script>
</body>
</html>
